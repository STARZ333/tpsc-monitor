<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="臺北市 12 座運動中心游泳池與健身房即時人數、佔用率與歷史走勢">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1216" media="(prefers-color-scheme: dark)">
<title>臺北市運動中心人流監測</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏊</text></svg>">

<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"
        integrity="sha384-CU0J6nu6GO5gWB5IqOOhPQsG0LKyjpotF5Gw502R+0zbkzKHjDWc6FKSZsNTJfLX" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"

<style>
:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --border: #e4e7ec;
  --text: #1a222c;
  --muted: #67717e;
  --accent: #2563eb;
  --accent-soft: #2563eb1f;
  --pool: #2f7ce8;
  --gym: #e8900c;
  --ok: #12a06e;
  --warn: #dd8b0b;
  --bad: #e0464c;
  --closed: #98a1ab;
  --track: #edf0f3;
  --heat1: #3574e0;
  --heat2: #7fa9ec;
  --heat3: #e6c579;
  --heat4: #ee8a4a;
  --heat5: #e0464c;
  --shadow: 0 1px 2px rgba(16,24,40,.05), 0 2px 8px rgba(16,24,40,.05);
  --radius: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1216;
    --surface: #171c22;
    --border: #2a313a;
    --text: #e7eaee;
    --muted: #98a1ab;
    --accent: #5a93f5;
    --accent-soft: #5a93f52b;
    --pool: #5a9cf8;
    --gym: #f0a83a;
    --ok: #2fbd8b;
    --warn: #eaa53c;
    --bad: #ef6b6f;
    --closed: #6d7680;
    --track: #232a32;
    --heat1: #5a9cf8;
    --heat2: #90bcf7;
    --heat3: #e3c97e;
    --heat4: #f09a52;
    --heat5: #ef6b6f;
    --shadow: 0 1px 2px rgba(0,0,0,.35);
  }
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto,
    "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  line-height: 1.5;
}
.wrap { max-width: 1080px; margin: 0 auto; padding: 20px 16px 40px; }

header h1 { margin: 4px 0 2px; font-size: 1.45rem; letter-spacing: .01em; }
.subtitle { color: var(--muted); font-size: .88rem; margin: 0; }
.status { display: inline-flex; align-items: center; gap: 7px; margin-top: 10px;
  font-size: .88rem; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; padding: 5px 13px; box-shadow: var(--shadow); }
.status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); flex: none; }
.status.stale .dot { background: var(--warn); }
.status.error .dot { background: var(--bad); }

.controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 18px 0 14px; }
.controls .spacer { flex: 1; }
.datenav { display: flex; align-items: center; gap: 6px; }
button, select, input[type="date"] {
  font: inherit; color: var(--text);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 12px; box-shadow: var(--shadow);
}
input[type="date"] { padding: 6px 10px; }
button { cursor: pointer; }
button:hover, select:hover { border-color: var(--accent); }
button:disabled { opacity: .4; cursor: default; }
button:disabled:hover { border-color: var(--border); }
.iconbtn { padding: 7px 10px; line-height: 1; }
.seg { display: inline-flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
.seg button { border: 0; border-radius: 0; box-shadow: none; padding: 7px 14px; color: var(--muted); }
.seg button.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

.card { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
.card h2 { margin: 0 0 4px; font-size: 1.02rem; }
.card .sub { color: var(--muted); font-size: .82rem; margin: 0 0 10px; }

.now-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px; margin-bottom: 14px; }
.stat { display: flex; flex-direction: column; gap: 6px; }
.stat .label { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: .9rem; }
.swatch { width: 10px; height: 10px; border-radius: 3px; flex: none; }
.stat .big { font-size: 2rem; font-weight: 700; line-height: 1.15; font-variant-numeric: tabular-nums; }
.stat .big .cap { font-size: 1.05rem; font-weight: 500; color: var(--muted); }
.stat .pct { font-size: .88rem; color: var(--muted); font-variant-numeric: tabular-nums; }
.bar { height: 8px; border-radius: 999px; background: var(--track); overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 999px; transition: width .4s ease; }
.lv-ok { background: var(--ok); } .lv-warn { background: var(--warn); }
.lv-bad { background: var(--bad); } .lv-closed { background: var(--closed); }
.t-ok { color: var(--ok); } .t-warn { color: var(--warn); }
.t-bad { color: var(--bad); } .t-closed { color: var(--closed); }

.chart-card { margin-bottom: 14px; }
.chart-box { position: relative; height: 300px; }
.chart-empty { position: absolute; inset: 0; display: none; align-items: center;
  justify-content: center; color: var(--muted); font-size: .95rem; }
.chart-box.empty .chart-empty { display: flex; }
.chart-box.empty canvas { visibility: hidden; }

.ov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(158px, 1fr)); gap: 10px; }
.ov { border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px;
  background: var(--surface); cursor: pointer; text-align: left; box-shadow: none; }
.ov:hover { border-color: var(--accent); }
.ov.on { border-color: var(--accent); background: var(--accent-soft); }
.ov .name { font-weight: 600; font-size: .92rem; margin-bottom: 6px; }
.ov .row { display: flex; align-items: center; gap: 7px; margin-top: 5px;
  font-size: .78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
.ov .row .tag { flex: none; width: 1.2em; }
.ov .row .bar { flex: 1; height: 6px; }
.ov .row .val { flex: none; min-width: 3.2em; text-align: right; }

/* 冷門時段熱力圖 */
.quiet-area + .quiet-area { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
.quiet-area .ahead { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: .95rem; }
.quiet-take { margin: 6px 0 0; font-size: .88rem; color: var(--muted); }
.quiet-take strong { color: var(--text); font-weight: 600; }
.heat { display: grid; grid-template-columns: max-content repeat(8, 1fr); gap: 4px;
  align-items: center; margin-top: 10px; }
.heat .hlabel { font-size: .7rem; color: var(--muted); text-align: center; }
.heat .rlabel { font-size: .78rem; color: var(--muted); padding-right: 4px; white-space: nowrap; }
.heat .cell { height: 26px; border-radius: 6px; background: var(--track); }
.heat .cell.sparse { opacity: .38; }
.heat .cell.hq1 { background: var(--heat1); } .heat .cell.hq2 { background: var(--heat2); }
.heat .cell.hq3 { background: var(--heat3); } .heat .cell.hq4 { background: var(--heat4); }
.heat .cell.hq5 { background: var(--heat5); }
.heat-legend { display: flex; align-items: center; gap: 7px; margin-top: 10px;
  font-size: .74rem; color: var(--muted); flex-wrap: wrap; }
.heat-legend .grad { width: 88px; height: 8px; border-radius: 999px;
  background: linear-gradient(90deg, var(--heat1), var(--heat3), var(--heat5)); }
.heat-legend .chip { width: 14px; height: 8px; border-radius: 3px; background: var(--track); }

footer { margin-top: 22px; color: var(--muted); font-size: .82rem; }
footer a { color: inherit; }

@media (max-width: 640px) {
  .wrap { padding: 14px 12px 32px; }
  header h1 { font-size: 1.22rem; }
  .chart-box { height: 240px; }
  .stat .big { font-size: 1.7rem; }
}
</style>

<body>
<div class="wrap">
  <header>
    <h1>🏊 臺北市運動中心人流監測</h1>
    <p class="subtitle">游泳池與健身房即時人數・佔用率・歷史走勢</p>
    <div id="status" class="status"><span class="dot"></span><span id="statusText">載入中…</span></div>
  </header>

  <div class="controls">
    <div class="datenav">
      <button id="prevDay" class="iconbtn" aria-label="前一天">◀</button>
      <input type="date" id="datePicker" aria-label="日期">
      <button id="nextDay" class="iconbtn" aria-label="後一天">▶</button>
      <button id="todayBtn">今天</button>
    </div>
    <select id="centerSelect" aria-label="運動中心"></select>
    <div class="seg" id="areaSeg" role="group" aria-label="顯示區域">
      <button data-mode="both" class="on">全部</button>
      <button data-mode="pool">游泳池</button>

    </div>
  </div>

  <section id="nowCards" class="now-grid" hidden>
    <div class="card stat" id="statPool">
      <div class="label"><span class="swatch" style="background:var(--pool)"></span>游泳池・目前人數</div>
      <div class="big">—</div>
      <div class="bar"><i></i></div>
      <div class="pct">—</div>
    </div>
    <div class="card stat" id="statGym">
      <div class="label"><span class="swatch" style="background:var(--gym)"></span>健身房・目前人數</div>
      <div class="big">—</div>
      <div class="bar"><i></i></div>
      <div class="pct">—</div>
    </div>
  </section>

  <section class="card chart-card">
    <h2>人數走勢</h2>
    <p class="sub" id="countSub"></p>
    <div class="chart-box" id="countBox">
      <canvas id="chartCount"></canvas>
      <div class="chart-empty">此日無資料</div>
    </div>
  </section>

  <section class="card chart-card">
    <h2>佔用率走勢（%）</h2>
    <p class="sub" id="occSub"></p>
    <div class="chart-box" id="occBox">
      <canvas id="chartOcc"></canvas>
      <div class="chart-empty">此日無資料</div>
    </div>
  </section>

  <section class="card chart-card" id="quietCard" hidden>
    <h2>冷門時段參考（過去 30 天）</h2>
    <p class="sub" id="quietSub"></p>
    <div id="quietBody"></div>
    <div class="heat-legend">
      <span>空</span><span class="grad"></span><span>滿</span>
      <span style="margin-left:10px" class="chip"></span><span>未開放</span>

    </div>
  </section>

  <section class="card">
    <h2>全市即時總覽</h2>
    <p class="sub">最新一次抓取的各中心佔用率（泳＝游泳池、健＝健身房），點擊切換中心</p>
    <div class="ov-grid" id="overview"></div>
  </section>

  <footer>
    資料來源：<a href="https://booking-tpsc.sporetrofit.com/Home/LocationPeopleNum" target="_blank" rel="noopener">臺北市運動中心預約系統</a>・
    由 <a href="https://github.com/STARZ333/tpsc-monitor" target="_blank" rel="noopener">GitHub Actions</a> 排程抓取（每 5 分鐘排程，實際間隔視 GitHub 負載而定）・
    本頁每分鐘自動檢查更新
  </footer>
</div>

<noscript><p style="text-align:center">此頁面需要啟用 JavaScript。</p></noscript>

<script>
'use strict';
window.addEventListener('DOMContentLoaded', () => {
const { DateTime } = luxon;
const TZ = 'Asia/Taipei';

const IS_LOCAL = ['localhost', '127.0.0.1', '[::1]', ''].includes(location.hostname)
  || location.protocol === 'file:';
const DATA_BASE = IS_LOCAL
  ? './data'
  : 'https://raw.githubusercontent.com/STARZ333/tpsc-monitor/main/data';

const AREA_LABEL = { pool: '游泳池', gym: '健身房' };
const $ = id => document.getElementById(id);

const state = {
  date: DateTime.now().setZone(TZ).toISODate(),
  center: localStorage.getItem('tpsc.center') || 'DASC',
  mode: localStorage.getItem('tpsc.mode') || 'both',
  dates: [],            // index.json：有資料的日期（升冪）
  latest: null,         // latest.json
  stats: null,          // stats.json：過去 30 天冷門時段統計
  rows: [],             // 目前所選日期的資料列
  dayLoaded: '',        // rows 對應的日期
};

/* ---------- 資料載入 ---------- */

async function fetchOk(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} ${url}`);
  return res;
}

async function loadIndex() {
  try {
    const idx = await (await fetchOk(`${DATA_BASE}/index.json`)).json();
    state.dates = idx.dates || [];
    const picker = $('datePicker');
    if (state.dates.length) {
      picker.min = state.dates[0];
      picker.max = state.dates[state.dates.length - 1] > state.date
        ? state.dates[state.dates.length - 1] : state.date;
    }
  } catch (e) { /* 沒有 index 時仍可運作 */ }
}

async function loadLatest() {
  try {
    const latest = await (await fetchOk(`${DATA_BASE}/latest.json`)).json();
    const changed = !state.latest || latest.scraped_at !== state.latest.scraped_at;
    state.latest = latest;
    renderStatus();
    renderNowCards();
    renderOverview();
    populateCenters();
    return changed;
  } catch (e) {
    setStatus('error', '無法載入最新資料');
    return false;
  }
}

function parseCsv(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line || line.startsWith('timestamp,')) continue;
    const p = line.split(',');
    if (p.length < 7) continue;
    const ts = DateTime.fromISO(p[0]);
    if (!ts.isValid) continue;
    rows.push({
      ms: ts.toMillis(), code: p[1], name: p[2], area: p[3],
      current: +p[4] || 0, capacity: +p[5] || 0, pct: +p[6] || 0,
    });
  }
  rows.sort((a, b) => a.ms - b.ms);
  return rows;
}

async function loadDay(date) {
  let rows = [];
  try {
    const text = await (await fetchOk(`${DATA_BASE}/daily/${date}.csv`)).text();
    rows = parseCsv(text);
  } catch (e) {
    /* 404 → 此日無資料 */
  }
  if (state.date !== date) return;   // 使用者已切到別的日期，丟棄過期回應
  state.rows = rows;
  state.dayLoaded = date;
  populateCenters();
  renderCharts();
}

/* ---------- 呈現：狀態列 ---------- */

function setStatus(kind, text) {
  const el = $('status');
  el.classList.toggle('stale', kind === 'stale');
  el.classList.toggle('error', kind === 'error');
  $('statusText').textContent = text;
}

function renderStatus() {
  if (!state.latest) return;
  const ts = DateTime.fromISO(state.latest.scraped_at).setZone(TZ);
  const ageMin = -ts.diffNow('minutes').minutes;
  const rel = ts.toRelative({ locale: 'zh-TW' }) || '';
  const stale = ageMin > 180;
  setStatus(stale ? 'stale' : 'ok',
    `最後更新 ${ts.toFormat('MM/dd HH:mm')}（${rel}）${stale ? '・資料延遲中' : ''}`);
}

/* ---------- 呈現：即時狀態卡與總覽 ---------- */

function level(pct, capacity) {
  if (!capacity) return 'closed';
  return pct < 50 ? 'ok' : pct < 80 ? 'warn' : 'bad';
}

function findCenter(code) {
  return state.latest?.centers.find(c => c.code === code) || null;
}

function renderStat(el, entry) {
  const big = el.querySelector('.big');
  const bar = el.querySelector('.bar > i');
  const pctEl = el.querySelector('.pct');
  if (!entry || !entry.capacity) {
    big.textContent = '—';
    bar.className = 'lv-closed'; bar.style.width = '100%';
    pctEl.textContent = '未開放'; pctEl.className = 'pct t-closed';
    return;
  }
  const pct = entry.current / entry.capacity * 100;
  const lv = level(pct, entry.capacity);
  big.innerHTML = `${entry.current} <span class="cap">/ ${entry.capacity} 人</span>`;
  bar.className = `lv-${lv}`;
  bar.style.width = Math.min(100, pct) + '%';
  pctEl.textContent = `佔用率 ${pct.toFixed(1)}%`;
  pctEl.className = `pct t-${lv}`;
}

function renderNowCards() {
  const c = findCenter(state.center);
  $('nowCards').hidden = !c;
  if (!c) return;
  renderStat($('statPool'), c.pool);
  renderStat($('statGym'), c.gym);
}

function ovRow(tag, entry) {
  if (!entry || !entry.capacity) {
    return `<div class="row"><span class="tag">${tag}</span>
      <div class="bar"><i class="lv-closed" style="width:100%"></i></div>
      <span class="val t-closed">未開放</span></div>`;
  }
  const pct = entry.current / entry.capacity * 100;
  const lv = level(pct, entry.capacity);
  return `<div class="row"><span class="tag">${tag}</span>
    <div class="bar"><i class="lv-${lv}" style="width:${Math.min(100, pct)}%"></i></div>
    <span class="val t-${lv}">${Math.round(pct)}%</span></div>`;
}

function renderOverview() {
  if (!state.latest) return;
  $('overview').innerHTML = state.latest.centers.map(c => `
    <button class="ov ${c.code === state.center ? 'on' : ''}" data-code="${c.code}" title="${c.name}">
      <div class="name">${c.name.replace('運動中心', '')}</div>
      ${ovRow('泳', c.pool)}${ovRow('健', c.gym)}
    </button>`).join('');
}

/* ---------- 冷門時段（過去 30 天）---------- */

async function loadStats() {
  try {
    state.stats = await (await fetchOk(`${DATA_BASE}/stats.json`)).json();
  } catch (e) {
    state.stats = null;
  }
  renderQuiet();
}

// 兩小時區塊合併：[n, 加權平均佔用, 期間最大人數]
function quietBlocks(hourCells) {
  const blocks = [];
  for (let b = 0; b < 8; b++) {
    const pair = hourCells.slice(b * 2, b * 2 + 2);
    const n = pair.reduce((s, c) => s + c[0], 0);
    const avg = n ? pair.reduce((s, c) => s + c[1] * c[0], 0) / n : 0;
    const max = Math.max(...pair.map(c => c[2]));
    blocks.push({ from: 6 + b * 2, to: 8 + b * 2, n, avg, max });
  }
  return blocks;
}

const blockLabel = b => `${String(b.from).padStart(2, '0')}–${String(b.to).padStart(2, '0')}`;
const MIN_SAMPLES = 3;

function heatClass(avg) {
  return avg < 15 ? 'hq1' : avg < 30 ? 'hq2' : avg < 45 ? 'hq3' : avg < 65 ? 'hq4' : 'hq5';
}

function quietRow(label, blocks) {
  const cells = blocks.map(b => {
    if (!b.max) return `<div class="cell" title="${label} ${blockLabel(b)} 時：未開放"></div>`;
    const cls = heatClass(b.avg) + (b.n < MIN_SAMPLES ? ' sparse' : '');
    return `<div class="cell ${cls}" title="${label} ${blockLabel(b)} 時：平均佔用 ${b.avg.toFixed(0)}%（${b.n} 筆）"></div>`;
  }).join('');
  return `<div class="rlabel">${label}</div>${cells}`;
}

function takeaway(label, blocks) {
  const ranked = blocks.filter(b => b.max > 0 && b.n >= MIN_SAMPLES)
    .sort((a, b) => a.avg - b.avg).slice(0, 2);
  if (!ranked.length) return `${label}：樣本不足`;
  return `${label}最少人：<strong>${ranked.map(blockLabel).join('、')} 時</strong>`;
}

function renderQuiet() {
  const card = $('quietCard');
  const data = state.stats?.centers?.[state.center];
  if (!data) { card.hidden = true; return; }
  card.hidden = false;
  $('quietSub').textContent =
    `${findCenter(state.center)?.name || state.center}・統計 ${state.stats.from} ～ ${state.stats.to} 營業時段（06–22 時）的平均佔用率`;

  const areas = state.mode === 'both' ? ['pool', 'gym'] : [state.mode];
  const hourLabels = Array.from({ length: 8 }, (_, b) =>
    `<div class="hlabel">${String(6 + b * 2).padStart(2, '0')}</div>`).join('');

  $('quietBody').innerHTML = areas.map(area => {
    const wd = quietBlocks(data[area].weekday);
    const we = quietBlocks(data[area].weekend);
    const inner = wd.concat(we).some(b => b.max > 0)
      ? `<p class="quiet-take">${takeaway('平日', wd)}・${takeaway('週末', we)}</p>
         <div class="heat">
           <div></div>${hourLabels}
           ${quietRow('平日', wd)}
           ${quietRow('週末', we)}
         </div>`
      : `<p class="quiet-take">尚無足夠資料（期間內未見開放）</p>`;
    return `<div class="quiet-area">
      <div class="ahead"><span class="swatch" style="background:var(--${area})"></span>${AREA_LABEL[area]}</div>
      ${inner}</div>`;
  }).join('');
}

/* ---------- 呈現：中心選單 ---------- */

function populateCenters() {
  const sel = $('centerSelect');
  const byCode = new Map();
  for (const c of state.latest?.centers || []) byCode.set(c.code, c.name);
  for (const r of state.rows) if (!byCode.has(r.code)) byCode.set(r.code, r.name);
  if (!byCode.size) return;
  const codes = [...byCode.keys()].sort();
  const html = codes.map(c => `<option value="${c}">${byCode.get(c)}</option>`).join('');
  if (sel.innerHTML !== html) sel.innerHTML = html;
  if (!byCode.has(state.center)) state.center = codes[0];
  sel.value = state.center;
}

/* ---------- 圖表 ---------- */

let countChart, occChart;

function chartColors() {
  const css = getComputedStyle(document.documentElement);
  const v = name => css.getPropertyValue(name).trim();
  return { pool: v('--pool'), gym: v('--gym'), border: v('--border'),
           text: v('--text'), muted: v('--muted') };
}

function makeChart(canvasId, yTitle, yMax) {
  const c = chartColors();
  return new Chart($(canvasId).getContext('2d'), {
    type: 'line',
    data: { datasets: [] },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', axis: 'x', intersect: false },
      scales: {
        x: {
          type: 'time',
          adapters: { date: { zone: TZ } },
          time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
          ticks: { autoSkip: true, maxTicksLimit: 13, color: c.muted },
          grid: { color: c.border },
        },
        y: {
          beginAtZero: true,
          suggestedMax: yMax,
          title: { display: true, text: yTitle, color: c.muted },
          ticks: { color: c.muted },
          grid: { color: c.border },
        },
      },
      plugins: {
        legend: { position: 'bottom', labels: { color: c.text, usePointStyle: true, boxHeight: 7 } },
        tooltip: {
          callbacks: {
            title: items => items.length
              ? DateTime.fromMillis(items[0].parsed.x, { zone: TZ }).toFormat('HH:mm') : '',
            label: item => {
              const p = item.raw;
              return `${item.dataset.label}：${p.cur} 人 / ${p.cap}（${p.pct.toFixed(1)}%）`;
            },
          },
        },
      },
    },
  });
}

function hexAlpha(hex, alpha) {
  return hex + Math.round(alpha * 255).toString(16).padStart(2, '0');
}

function setDatasets(chart, next) {
  const prev = new Map(chart.data.datasets.map(d => [d.label, d]));
  chart.data.datasets = next.map(nd => {
    const old = prev.get(nd.label);
    if (old) { Object.assign(old, nd); return old; }
    return nd;
  });
}

function renderCharts() {
  if (!countChart) return;
  const c = chartColors();
  const areas = state.mode === 'both' ? ['pool', 'gym'] : [state.mode];
  const base = state.rows.filter(r => r.code === state.center);

  const dataset = (area, valueOf) => {
    const color = c[area];
    return {
      label: AREA_LABEL[area],
      data: base.filter(r => r.area === AREA_LABEL[area])
        .map(r => ({ x: r.ms, y: valueOf(r), cur: r.current, cap: r.capacity, pct: r.pct })),
      borderColor: color,
      backgroundColor: hexAlpha(color, 0.10),
      pointBackgroundColor: color,
      fill: 'origin',
      borderWidth: 2,
      pointRadius: 2.5,
      hitRadius: 8,
      tension: 0.3,
      spanGaps: true,
    };
  };

  const dayStart = DateTime.fromISO(state.date, { zone: TZ }).startOf('day');
  const xMin = dayStart.toMillis();
  const xMax = dayStart.plus({ days: 1 }).toMillis();
  let total = 0;

  for (const [chart, valueOf] of [
    [countChart, r => r.current],
    [occChart, r => r.pct],
  ]) {
    const ds = areas.map(a => dataset(a, valueOf));
    total = ds.reduce((n, d) => n + d.data.length, 0);
    setDatasets(chart, ds);
    chart.options.scales.x.min = xMin;
    chart.options.scales.x.max = xMax;
    chart.update('none');
  }

  const centerName = findCenter(state.center)?.name
    || base[0]?.name || state.center;
  const subText = `${state.date}・${centerName}`;
  $('countSub').textContent = subText;
  $('occSub').textContent = subText;
  const emptyText = state.rows.length ? '此中心於此日無資料' : '此日無資料';
  for (const boxId of ['countBox', 'occBox']) {
    const box = $(boxId);
    box.classList.toggle('empty', total === 0);
    box.querySelector('.chart-empty').textContent = emptyText;
  }
}

function applyChartTheme() {
  const c = chartColors();
  for (const chart of [countChart, occChart]) {
    if (!chart) continue;
    const s = chart.options.scales;
    s.x.ticks.color = c.muted; s.x.grid.color = c.border;
    s.y.ticks.color = c.muted; s.y.grid.color = c.border;
    s.y.title.color = c.muted;
    chart.options.plugins.legend.labels.color = c.text;
    chart.update('none');
  }
  renderCharts();  // 線色也跟著主題換
}

/* ---------- 日期導覽 ---------- */

function gotoDate(date) {
  state.date = date;
  $('datePicker').value = date;
  updateNavButtons();
  loadDay(date);
}

function updateNavButtons() {
  const { dates } = state;
  $('prevDay').disabled = !dates.some(d => d < state.date);
  $('nextDay').disabled = !dates.some(d => d > state.date);
}

function stepDay(dir) {
  const { dates } = state;
  const next = dir < 0
    ? [...dates].reverse().find(d => d < state.date)
    : dates.find(d => d > state.date);
  if (next) gotoDate(next);
}

/* ---------- 事件與初始化 ---------- */

function selectCenter(code) {
  state.center = code;
  localStorage.setItem('tpsc.center', code);
  $('centerSelect').value = code;
  renderNowCards();
  renderOverview();
  renderCharts();
  renderQuiet();
}

$('centerSelect').addEventListener('change', e => selectCenter(e.target.value));
$('overview').addEventListener('click', e => {
  const btn = e.target.closest('.ov');
  if (btn) selectCenter(btn.dataset.code);
});
$('areaSeg').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  state.mode = btn.dataset.mode;
  localStorage.setItem('tpsc.mode', state.mode);
  for (const b of $('areaSeg').children) b.classList.toggle('on', b === btn);
  renderCharts();
  renderQuiet();
});
$('datePicker').addEventListener('change', e => {
  if (e.target.value) gotoDate(e.target.value);
});
$('prevDay').addEventListener('click', () => stepDay(-1));
$('nextDay').addEventListener('click', () => stepDay(1));
$('todayBtn').addEventListener('click', () => gotoDate(DateTime.now().setZone(TZ).toISODate()));

async function refresh() {
  const changed = await loadLatest();
  if (changed) {
    loadStats();   // 資料更新時統計也已在 CI 重新生成
    const today = DateTime.now().setZone(TZ).toISODate();
    if (state.date === state.dayLoaded && state.date === today) {
      await loadDay(state.date);   // 只有看今天且真的有新資料才重抓當日檔
    }
  }
  updateNavButtons();
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) refresh();
});

(async function init() {
  for (const b of $('areaSeg').children) b.classList.toggle('on', b.dataset.mode === state.mode);
  $('datePicker').value = state.date;
  countChart = makeChart('chartCount', '人數');
  occChart = makeChart('chartOcc', '佔用率 (%)', 100);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyChartTheme);

  await loadIndex();
  await loadLatest();
  await Promise.all([loadDay(state.date), loadStats()]);
  updateNavButtons();
  setInterval(refresh, 60 * 1000);
})();
});
</script>
